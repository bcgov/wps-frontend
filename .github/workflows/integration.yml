name: Integration

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint, Test with Coverage & SonarQube
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [10.x]
    steps:
      - uses: actions/checkout@v2
        with:
          # For sonar-scanner to work properly we can't use a shallow fetch.
          fetch-depth: 0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Cypress tests
        run: npm run cypress:ci
        env:
          REACT_APP_API_BASE_URL: http://localhost:8080/api
          REACT_APP_HIDE_DISCLAIMER: true
          REACT_APP_FIDER_LINK: https://psufiderdev.pathfinder.gov.bc.ca/
          REACT_APP_KEYCLOAK_AUTH_URL: https://sso-dev.pathfinder.gov.bc.ca/auth
          REACT_APP_KEYCLOAK_REALM: ${{ secrets.KEYCLOAK_DEV_REALM }}
          REACT_APP_KEYCLOAK_CLIENT: ${{ secrets.KEYCLOAK_DEV_CLIENT }}
          cypress_auth_realm: ${{ secrets.KEYCLOAK_DEV_REALM }}
          cypress_auth_client_id: ${{ secrets.KEYCLOAK_DEV_CLIENT }}

      # - name: Tests with coverage
      #   run: npm run coverage:ci

      - name: Fix code coverage paths
        # Due to the way sonarscanner mounts thing when running in docker, we need to change the coverage file.
        working-directory: ./coverage
        run: |
          sed -i 's/\/home\/runner\/work\/wps-web\/wps-web\//\/github\/workspace\//g' lcov.info

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
