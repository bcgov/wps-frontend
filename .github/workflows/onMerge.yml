name: Post-merge Rollout

on:
  pull_request:
    types: [closed]
jobs:
  clean-up:
    name: Build and Deploy from Target Branch
    runs-on: ubuntu-latest
    steps:
      - name: Set and Echo Variables
        shell: bash
        run: |
          echo -e "\n\n--- Environment Variables ---\n"
          echo "HOME: ${HOME}"
          echo "GITHUB_WORKFLOW: ${GITHUB_WORKFLOW}"
          echo "GITHUB_RUN_ID: ${GITHUB_RUN_ID}"
          echo "GITHUB_RUN_NUMBER: ${GITHUB_RUN_NUMBER}"
          echo "GITHUB_ACTION: ${GITHUB_ACTION}"
          echo "GITHUB_ACTIONS: ${GITHUB_ACTIONS}"
          echo "GITHUB_ACTOR: ${GITHUB_ACTOR}"
          echo "GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}"
          echo "GITHUB_EVENT_NAME: ${GITHUB_EVENT_NAME}"
          echo "GITHUB_EVENT_PATH: ${GITHUB_EVENT_PATH}"
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}"
          echo "GITHUB_SHA: ${GITHUB_SHA}"
          echo "GITHUB_REF: ${GITHUB_REF}"
          echo "GITHUB_HEAD_REF: ${GITHUB_HEAD_REF}"
          echo "GITHUB_BASE_REF: ${GITHUB_BASE_REF}"
          echo -e "\n\n--- Workflow (Custom) Variables ---\n"
          BRANCH=${GITHUB_REF##*/}
          SUFFIX="${BRANCH}"
          TARGET="auzhsi-test"
          if [ "${BRANCH}" == "master" ]; then
            TARGET="auzhsi-prod-not-ready-yet"
            SUFFIX="prod-not-ready-yet"
          fi
          echo "::set-env name=BRANCH::${BRANCH}"
          echo "::set-env name=SUFFIX::${SUFFIX}"
          echo "::set-env name=TARGET::${TARGET}"
          echo "BRANCH: ${BRANCH}"
          echo "SUFFIX: ${SUFFIX}"
          echo "TARGET: ${TARGET}"

      - name: Checkout
        if: github.event.pull_request.merged == true
        uses: actions/checkout@v2

      - name: Build
        if: github.event.pull_request.merged == true
        uses: bcgov/openshift-launchpad-deployment@master
        with:
          AUTH_TOKEN: ${{ secrets.action_token }}
          SCRIPT: GIT_BRANCH=${BRANCH} openshift/scripts/oc_build.sh ${SUFFIX} apply

      - name: Deploy
        if: github.event.pull_request.merged == true
        uses: bcgov/openshift-launchpad-deployment@master
        with:
          AUTH_TOKEN: ${{ secrets.action_token }}
          SCRIPT: PROJ_DEV=${TARGET} openshift/scripts/oc_deploy.sh ${SUFFIX} apply

      - name: Comment on PR
        if: github.event.pull_request.merged == true
        uses: thollander/actions-comment-pull-request@master
        with:
          message: 'Rollout triggered!  Please see the appropriate "Post-merge Rollout" GitHub Action. https://github.com/bcgov/wps-web/actions?query=workflow%3A%22Post-merge+Rollout%22'
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACTION_TOKEN }}