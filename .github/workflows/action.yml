name: Pull Request Build & Deployment with scripts

on: [push, pull_request]

jobs:
  build:
    name: OpenShift Deployment Using GH Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Build image
        uses: bcgov/openshift-launchpad-deployment@custom-script
        with:
          AUTH_TOKEN: ${{ secrets.action_token }}
          CLUSTER: auzhsi-tools
          BRANCH: ${{ github.event.pull_request.head.ref }}
          APP_NAME: wps-web-pr${{ github.event.number }}-coco
          SCRIPT: openshift/scripts/oc_build.sh pr-${{ github.event.number }}-coco